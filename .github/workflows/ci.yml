name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: aegis-seal-gateway
      - uses: actions/checkout@v6
        with:
          repository: 100monkeys-ai/aegis-proto
          path: aegis-proto
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: aegis-seal-gateway -> target
      - name: Cargo check
        working-directory: aegis-seal-gateway
        run: cargo check --locked
      - name: Clippy
        working-directory: aegis-seal-gateway
        run: cargo clippy --locked -- -D warnings

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: aegis-seal-gateway
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        working-directory: aegis-seal-gateway
        run: cargo fmt --all -- --check

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: seal_gateway_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
        with:
          path: aegis-seal-gateway
      - uses: actions/checkout@v6
        with:
          repository: 100monkeys-ai/aegis-proto
          path: aegis-proto
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: aegis-seal-gateway -> target
      - name: Run tests
        working-directory: aegis-seal-gateway
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/seal_gateway_test
        run: cargo test --locked

  package:
    name: Package verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: aegis-seal-gateway
      - uses: actions/checkout@v6
        with:
          repository: 100monkeys-ai/aegis-proto
          path: aegis-proto
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: aegis-seal-gateway -> target
      - name: Prepare proto files for packaging
        working-directory: aegis-seal-gateway
        run: |
          mkdir -p proto-vendor/aegis
          if [ ! -f proto-vendor/aegis/seal_gateway.proto ]; then
            cp ../aegis-proto/proto/seal_gateway.proto proto-vendor/aegis/seal_gateway.proto
          fi
      - name: Verify package includes all required files
        working-directory: aegis-seal-gateway
        run: cargo package --no-verify --locked --allow-dirty
