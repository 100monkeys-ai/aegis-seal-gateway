name: Docker PR Build

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Docker Image (No Push)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout gateway
        uses: actions/checkout@v6
        with:
          path: aegis-seal-gateway

      - name: Checkout proto repo
        uses: actions/checkout@v6
        with:
          repository: 100monkeys-ai/aegis-proto
          path: aegis-proto

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: aegis-seal-gateway/Dockerfile
          push: false
          tags: aegis-seal-gateway:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
